  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

/ LIVE SITE PROOF ============ -->\n  <header style=\"position:sticky;top:0;z-index:60;background:#FFFFFF;border-bottom:1px solid #E2E8F0;box-shadow:0 1px 3px rgba(15,23,42,0.06);\">\n    <div style=\"max-width:1280px;margin:0 auto;padding:0 28px;height:74px;display:flex;align-items:center;gap:28px;\">\n      <!-- wordmark -->\n      <div style=\"display:flex;align-items:baseline;gap:2px;user-select:none;\">\n        <span style=\"font-weight:900;font-size:27px;letter-spacing:-0.03em;color:#005DAA;\">Costco<\u002Fspan>\n        <span style=\"width:7px;height:7px;border-radius:50%;background:#E31837;align-self:flex-start;margin-top:6px;display:inline-block;\"><\u002Fspan>\n      <\u002Fdiv>\n      <!-- primary binary nav -->\n      <nav style=\"display:flex;align-items:stretch;gap:6px;height:100%;\">\n        <button onclick=\"{{ closeMenu }}\" style=\"{{ shopBtnStyle }}\">\n          <span>Shop<\u002Fspan>\n          <span class=\"rs-ico\" style=\"display:inline-flex;font-size:16px;margin-top:1px;\"><i data-lucide=\"chevron-down\"><\u002Fi><\u002Fspan>\n        <\u002Fbutton>\n        <button onclick=\"{{ toggleMenu }}\" style=\"{{ myCostcoBtnStyle }}\">\n          <span>My Costco<\u002Fspan>\n          <span class=\"rs-ico\" style=\"display:inline-flex;font-size:16px;margin-top:1px;\"><i data-lucide=\"{{ myCostcoChevron }}\"><\u002Fi><\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fnav>\n      <!-- search -->\n      <div style=\"flex:1;max-width:460px;margin:0 auto;\">\n        <div style=\"display:flex;align-items:center;gap:10px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:10px;padding:10px 14px;color:#64748B;\">\n          <span class=\"rs-ico\" style=\"font-size:18px;display:inline-flex;\"><i data-lucide=\"search\"><\u002Fi><\u002Fspan>\n          <span style=\"font-size:14px;\">Search products &amp; services<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- right cluster -->\n      <div style=\"display:flex;align-items:center;gap:20px;color:#334155;\">\n        <span class=\"rs-ico\" style=\"font-size:21px;display:inline-flex;cursor:pointer;\"><i data-lucide=\"map-pin\"><\u002Fi><\u002Fspan>\n        <span class=\"rs-ico\" style=\"font-size:21px;display:inline-flex;cursor:pointer;\"><i data-lucide=\"user\"><\u002Fi><\u002Fspan>\n        <span class=\"rs-ico\" style=\"font-size:21px;display:inline-flex;cursor:pointer;position:relative;\"><i data-lucide=\"shopping-cart\"><\u002Fi><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- MEGA MENU -->\n    <div style=\"{{ menuWrapStyle }}\">\n      <div style=\"border-top:1px solid #E2E8F0;background:linear-gradient(180deg,#FFFFFF 0%,#F8FAFC 100%);box-shadow:0 24px 40px -18px rgba(15,23,42,0.25);\">\n        <div style=\"max-width:1280px;margin:0 auto;padding:34px 28px 40px;\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:24px;\">\n            <span class=\"rs-eyebrow\" style=\"font-size:11.5px;color:#E31837;\">The Unified Ecosystem<\u002Fspan>\n            <span style=\"flex:1;height:1px;background:#E2E8F0;\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:0;\">\n\n            <!-- PILLAR 1 -->\n            <div style=\"padding:0 32px 0 0;border-right:1px solid #E2E8F0;\">\n              <div style=\"display:flex;align-items:flex-start;gap:12px;margin-bottom:6px;\">\n                <span style=\"width:40px;height:40px;border-radius:10px;background:#005DAA;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><span class=\"rs-ico\" style=\"font-size:21px;display:inline-flex;\"><i data-lucide=\"concierge-bell\"><\u002Fi><\u002Fspan><\u002Fspan>\n                <div>\n                  <div style=\"font-weight:800;font-size:16px;color:#0F172A;line-height:1.2;\">My Costco Services<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#E31837;font-weight:600;\">Let Us Handle It<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:2px 14px;margin-top:14px;\">\n                <sc-for list=\"{{ services8 }}\" as=\"svc\" hint-placeholder-count=\"8\">\n                  <a href=\"#\" style=\"display:flex;align-items:center;gap:9px;padding:9px 8px;border-radius:8px;color:#334155;font-size:13.5px;font-weight:500;transition:background .15s;\" style-hover=\"background:#EEF4FB;color:#005DAA;\">\n                    <span class=\"rs-ico\" style=\"font-size:16px;display:inline-flex;color:#005DAA;\"><i data-lucide=\"{{ svc.icon }}\"><\u002Fi><\u002Fspan>\n                    <span>{{ svc.name }}<\u002Fspan>\n                  <\u002Fa>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- PILLAR 2 -->\n            <div style=\"padding:0 32px;border-right:1px solid #E2E8F0;\">\n              <div style=\"display:flex;align-items:flex-start;gap:12px;margin-bottom:6px;\">\n                <span style=\"width:40px;height:40px;border-radius:10px;background:#003A6B;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><span class=\"rs-ico\" style=\"font-size:21px;display:inline-flex;\"><i data-lucide=\"gem\"><\u002Fi><\u002Fspan><\u002Fspan>\n                <div>\n                  <div style=\"font-weight:800;font-size:16px;color:#0F172A;line-height:1.2;\">My Costco Benefits<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#E31837;font-weight:600;\">Value Beyond the Aisles<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:2px;margin-top:14px;\">\n                <sc-for list=\"{{ benefits }}\" as=\"ben\" hint-placeholder-count=\"6\">\n                  <a href=\"#\" style=\"display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;color:#334155;font-size:13.5px;font-weight:500;transition:background .15s;\" style-hover=\"background:#EEF4FB;color:#005DAA;\">\n                    <span class=\"rs-ico\" style=\"font-size:16px;display:inline-flex;color:#005DAA;\"><i data-lucide=\"{{ ben.icon }}\"><\u002Fi><\u002Fspan>\n                    <span>{{ ben.name }}<\u002Fspan>\n                  <\u002Fa>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- PILLAR 3 -->\n            <div style=\"padding:0 0 0 32px;\">\n              <div style=\"display:flex;align-items:flex-start;gap:12px;margin-bottom:6px;\">\n                <span style=\"width:40px;height:40px;border-radius:10px;background:#E31837;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><span class=\"rs-ico\" style=\"font-size:21px;display:inline-flex;\"><i data-lucide=\"warehouse\"><\u002Fi><\u002Fspan><\u002Fspan>\n                <div>\n                  <div style=\"font-weight:800;font-size:16px;color:#0F172A;line-height:1.2;\">My Costco Warehouse<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#E31837;font-weight:600;\">Master Your Run<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:2px;margin-top:14px;\">\n                <sc-for list=\"{{ warehouse }}\" as=\"wh\" hint-placeholder-count=\"6\">\n                  <a href=\"#\" style=\"display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;color:#334155;font-size:13.5px;font-weight:500;transition:background .15s;\" style-hover=\"background:#FDECEF;color:#E31837;\">\n                    <span class=\"rs-ico\" style=\"font-size:16px;display:inline-flex;color:#E31837;\"><i data-lucide=\"{{ wh.icon }}\"><\u002Fi><\u002Fspan>\n                    <span>{{ wh.name }}<\u002Fspan>\n                  <\u002Fa>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- click-away overlay -->\n  <div onclick=\"{{ closeMenu }}\" style=\"{{ overlayStyle }}\"><\u002Fdiv>\n\n  <!-- ============ HERO / MANIFESTO ============ -->\n  <section style=\"position:relative;background:linear-gradient(160deg,#00284D 0%,#003A6B 48%,#005DAA 100%);color:#fff;overflow:hidden;\">\n    <div style=\"position:absolute;top:-160px;right:-120px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(227,24,55,0.28) 0%,rgba(227,24,55,0) 68%);\"><\u002Fdiv>\n    <div style=\"position:absolute;bottom:-200px;left:-140px;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(91,140,255,0.22) 0%,rgba(91,140,255,0) 70%);\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:1280px;margin:0 auto;padding:88px 28px 104px;\">\n      <div style=\"max-width:880px;\">\n        <div style=\"display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.16);padding:8px 16px;border-radius:100px;margin-bottom:26px;\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:#E31837;box-shadow:0 0 10px #E31837;\"><\u002Fspan>\n          <span class=\"rs-eyebrow\" style=\"font-size:11px;color:#CFE0F3;\">The My Costco Ecosystem · Services Leadership Proposal<\u002Fspan>\n        <\u002Fdiv>\n        <h1 style=\"font-size:64px;line-height:1.02;font-weight:900;letter-spacing:-0.03em;margin:0 0 22px;text-wrap:balance;\">Your Membership,<br><span style=\"color:#8FC0F0;\">Reimagined.<\u002Fspan><\u002Fh1>\n        <p style=\"font-size:21px;line-height:1.5;color:#CFE0F3;max-width:680px;margin:0 0 40px;font-weight:400;\">Evolving Costco from a transactional warehouse to a relational life ecosystem — where the card doesn't just open the door, it manages the household.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:14px;\">\n          <button onclick=\"{{ scrollToDash }}\" style=\"display:inline-flex  }\n  }\n\n  componentDidUpdate() { this.refreshIcons(); }\n\n  componentWillUnmount() { if (this._obs) this._obs.disconnect(); }\n\n  refreshIcons() {\n    if (window.lucide && window.lucide.createIcons) {\n      try { window.lucide.createIcons(); } catch (e) {}\n    }\n  }\n\n  tween(id, to, prefix, suffix, decimals) {\n    const el = document.getElementById(id);\n    if (!el) return;\n    const dur = 1500, start = performance.now();\n    const step = (now) => {\n      const p = Math.min(1, (now - start) / dur);\n      const e = 1 - Math.pow(1 - p, 3);\n      const val = to * e;\n      el.textContent = (prefix || '') + (decimals ? val.toFixed(decimals) : Math.round(val)) + (suffix || '');\n      if (p < 1) requestAnimationFrame(step);\n    };\n    requestAnimationFrame(step);\n  }\n\n  animateCounts() {\n    this.tween('cnt-uplift', 110, '+', '%', 0);\n    this.tween('cnt-mlv', 38, '+', '%', 0);\n    this.tween('cnt-calls', 45, '', '%', 0);\n  }\n\n  // hero switcher\n  setTransactional = () => this.setState({ view: 'transactional' });\n  setRelational = () => this.setState({ view: 'relational' });\n\n  // mega menu\n  toggleMenu = () => this.setState((s) => ({ menuOpen: !s.menuOpen }));\n  openMenu = () => this.setState({ menuOpen: true });\n  closeMenu = () => this.setState({ menuOpen: false });\n\n  // channel tabs\n  setChWarehouse = () => this.setState({ channel: 'warehouse' });\n  setChDigital = () => this.setState({ channel: 'digital' });\n  setChConnection = () => this.setState({ channel: 'connection' });\n\n  scrollToDash = () => { const el = document.getElementById('rs-dashboard'); if (el) window.scrollTo({ top: el.offsetTop, behavior: 'smooth' }); };\n  scrollTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });\n\n  renderVals() {\n    const accent = this.props.accentColor || '#E31837';\n    const BLUE = '#005DAA';\n    const isTrans = this.state.view === 'transactional';\n    const isRel = this.state.view === 'relational';\n    const open = this.state.menuOpen;\n    const ch = this.state.channel;\n\n    const navBtnBase = 'display:flex;align-items:center;gap:5px;padding:0 6px;height:100%;background:none;border:none;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;position:relative;transition:color .15s;';\n    const shopBtnStyle = navBtnBase + 'color:#334155;border-bottom:3px solid transparent;';\n    const myCostcoActive = 'color:' + BLUE + ';border-bottom:3px solid ' + accent + ';font-weight:800;';\n    const myCostcoBtnStyle = navBtnBase + (open ? myCostcoActive : 'color:#334155;border-bottom:3px solid transparent;');\n\n    const menuWrapStyle = 'position:absolute;left:0;right:0;top:100%;z-index:59;transition:opacity .28s cubic-bezier(0.22,1,0.36,1),transform .28s cubic-bezier(0.22,1,0.36,1);'\n      + (open ? 'opacity:1;transform:translateY(0);visibility:visible;pointer-events:auto;' : 'opacity:0;transform:translateY(-10px);visibility:hidden;pointer-events:none;');\n\n    const overlayStyle = 'position:fixed;inset:0;z-index:40;background:rgba(15,23,42,0.28);' + (open ? 'display:block;' : 'display:none;');\n\n    // hero cards\n    const cardBase = 'border-radius:16px;padding:30px;cursor:pointer;transition:all .28s cubic-bezier(0.22,1,0.36,1);';\n    const activeCard = cardBase + 'background:rgba(255,255,255,0.09);border:1px solid ' + accent + ';box-shadow:0 0 0 1px ' + accent + ',0 18px 44px -18px rgba(227,24,55,0.55);transform:translateY(-4px);';\n    const idleCard = cardBase + 'background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.12);opacity:0.72;';\n    const transCardStyle = isTrans ? activeCard : idleCard;\n    const relCardStyle = isRel ? activeCard : idleCard;\n\n    const tagBase = 'font-size:11px;font-weight:800;letter-spacing:0.12em;padding:5px 11px;border-radius:6px;';\n    const transTagStyle = tagBase + (isTrans ? 'background:' + accent + ';color:#fff;' : 'background:rgba(148,163,184,0.2);color:#94A3B8;');\n    const relTagStyle = tagBase + (isRel ? 'background:' + accent + ';color:#fff;' : 'background:rgba(148,163,184,0.2);color:#94A3B8;');\n\n    // hero toggle pills\n    const pillBase = 'padding:7px 16px;border-radius:100px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;';\n    const pillActive = pillBase + 'background:#fff;color:#00284D;';\n    const pillIdle = pillBase + 'background:transparent;color:#B8CBE0;';\n    const toggleTransStyle = isTrans ? pillActive : pillIdle;\n    const toggleRelStyle = isRel ? pillActive : pillIdle;\n\n    // channel tabs\n    const chBase = 'display:inline-flex;align-items:center;gap:9px;padding:13px 20px;border-radius:11px;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;transition:all .18s;';\n    const chActive = chBase + 'background:' + BLUE + ';color:#fff;border:1px solid ' + BLUE + ';box-shadow:0 8px 20px -8px rgba(0,93,170,0.5);';\n    const chIdle = chBase + 'background:#fff;color:#64748B;border:1px solid #E2E8F0;';\n    const chTabWarehouseStyle = ch === 'warehouse' ? chActive : chIdle;\n    const chTabDigitalStyle = ch === 'digital' ? chActive : chIdle;\n    const chTabConnectionStyle = ch === 'connection' ? chActive : chIdle;\n\n    return {\n      shopBtnStyle, myCostcoBtnStyle, menuWrapStyle, overlayStyle,\n      myCostcoChevron: open ? 'chevron-up' : 'chevron-down',\n      toggleMenu: this.toggleMenu, openMenu: this.openMenu, closeMenu: this.closeMenu,\n      setTransactional: this.setTransactional, setRelational: this.setRelational,\n      transCardStyle, relCardStyle, transTagStyle, relTagStyle,\n      toggleTransStyle, toggleRelStyle,\n      setChWarehouse: this.setChWarehouse, setChDigital: this.setChDigital, setChConnection: this.setChConnection,\n      chTabWarehouseStyle, chTabDigitalStyle, chTabConnectionStyle,\n      isWarehouse: ch === 'warehouse', isDigital: ch === 'digital', isConnection: ch === 'connection',\n      scrollToDash: this.scrollToDash, scrollTop: this.scrollTop,\n      services8: [\n        { name: 'Health Services', icon: 'heart-pulse' },\n        { name: 'Auto & Tires', icon: 'car' },\n        { name: 'Travel & Fun', icon: 'plane' },\n        { name: 'Home Improvement', icon: 'hammer' },\n        { name: 'Insurance', icon: 'shield' },\n        { name: 'Financial Services', icon: 'landmark' },\n        { name: 'Business Services', icon: 'briefcase' },\n        { name: 'Other Services', icon: 'layout-grid' }\n      ],\n      benefits: [\n        { name: 'Kirkland Signature Brand Story', icon: 'award' },\n        { name: 'Costco Credit Card', icon: 'credit-card' },\n        { name: 'Costco Direct', icon: 'package' },\n        { name: 'Digital Wallet', icon: 'wallet' },\n        { name: 'App Access', icon: 'smartphone' },\n        { name: 'Delivery & Installation Perks', icon: 'truck' }\n      ],\n      warehouse: [\n        { name: 'Fuel Station', icon: 'fuel' },\n        { name: 'Optical Department', icon: 'glasses' },\n        { name: 'Pharmacy', icon: 'pill' },\n        { name: 'Food Court', icon: 'utensils' },\n        { name: 'Custom Cakes', icon: 'cake' },\n        { name: 'In-Warehouse Appointments', icon: 'calendar-clock' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
